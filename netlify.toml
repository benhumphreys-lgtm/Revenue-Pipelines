[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/hubspot-search"
  to = "/.netlify/functions/hubspot-search"
  status = 200

[[redirects]]
  from = "/api/hubspot-owners"
  to = "/.netlify/functions/hubspot-owners"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
